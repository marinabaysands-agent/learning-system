<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning System</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: oklch(97.5% 0.004 60);
  --surface: oklch(100% 0 0);
  --text: oklch(15% 0.01 60);
  --text2: oklch(45% 0.01 60);
  --text3: oklch(62% 0.01 60);
  --accent: oklch(45% 0.12 25);
  --accent-soft: oklch(92% 0.04 25);
  --done: oklch(55% 0.08 155);
  --done-soft: oklch(93% 0.03 155);
  --border: oklch(93% 0.003 60);
  --serif: 'Noto Serif SC', Georgia, serif;
  --sans: 'Source Sans 3', -apple-system, system-ui, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }
.page-content { max-width: 390px; margin: 0 auto; padding: 56px 24px 100px; }

.home-header { text-align: center; padding: 8px 0 24px; }
.home-greeting { font-size: 0.8125rem; color: var(--text3); }
.home-title { font-family: var(--serif); font-size: 1.5rem; font-weight: 700; margin-top: 2px; letter-spacing: -0.02em; }

.streak-bar {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 10px 16px; background: var(--accent-soft); border-radius: 100px;
  margin: 0 auto 28px; width: fit-content;
}
.streak-fire { font-size: 1rem; }
.streak-text { font-size: 0.75rem; font-weight: 600; color: var(--accent); }

.today-hero {
  position: relative; padding: 24px; background: var(--surface); border-radius: 20px;
  box-shadow: 0 1px 2px oklch(0% 0 0 / 0.04), 0 8px 24px oklch(0% 0 0 / 0.06), 0 0 0 1px oklch(0% 0 0 / 0.03);
  overflow: hidden; cursor: pointer;
}
.today-hero::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, var(--accent), oklch(55% 0.10 50));
}
.today-date { font-size: 0.6875rem; font-weight: 600; color: var(--accent); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 10px; }
.today-title { font-family: var(--serif); font-size: 1.0625rem; font-weight: 600; line-height: 1.45; }
.today-meta { font-size: 0.75rem; color: var(--text3); margin-top: 8px; }
.today-progress { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
.today-progress-bar { flex: 1; height: 4px; background: oklch(93% 0.003 60); border-radius: 2px; overflow: hidden; }
.today-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.6s ease; }
.today-progress-pct { font-size: 0.6875rem; font-weight: 600; color: var(--accent); min-width: 32px; text-align: right; }

.timeline { margin-top: 32px; }
.tl-section-label { font-size: 0.6875rem; font-weight: 600; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 12px; }
.tl-item {
  display: flex; gap: 14px; align-items: flex-start;
  padding: 14px 0; border-bottom: 1px solid oklch(94% 0.003 60); position: relative;
}
.tl-item:last-child { border-bottom: none; }
.tl-date-col { width: 44px; flex-shrink: 0; text-align: center; }
.tl-day-num { font-size: 1.125rem; font-weight: 700; color: var(--text2); line-height: 1; }
.tl-day-name { font-size: 0.625rem; color: var(--text3); margin-top: 2px; }
.tl-content { flex: 1; min-width: 0; }
.tl-title { font-size: 0.875rem; font-weight: 500; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tl-subtitle { font-size: 0.6875rem; color: var(--text3); margin-top: 2px; }
.tl-item.future .tl-day-num { color: oklch(75% 0.01 60); }
.tl-item.future .tl-title { color: var(--text2); }
.tl-item.done .tl-day-num { color: var(--done); }
.tl-item.done .tl-title { color: var(--text2); }
.tl-done-dot { width: 18px; height: 18px; border-radius: 50%; background: var(--done-soft); display: flex; align-items: center; justify-content: center; flex-shrink: 0; align-self: center; }
.tl-done-dot::after { content: '✓'; font-size: 0.625rem; color: var(--done); font-weight: 700; }
.tl-item.today-item { background: var(--accent-soft); margin: 0 -16px; padding: 14px 16px; border-radius: 12px; border-bottom: none; }
.tl-item.today-item .tl-day-num { color: var(--accent); }
.tl-item.today-item .tl-title { font-weight: 600; color: var(--text); }

.mini-month { margin-top: 28px; padding: 16px 20px; background: var(--surface); border-radius: 16px; box-shadow: 0 1px 3px oklch(0% 0 0 / 0.04); }
.mini-month-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.mini-month-title { font-size: 0.8125rem; font-weight: 600; }
.mini-month-nav { font-size: 0.75rem; color: var(--text3); }
.mini-cal { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
.mc-head { font-size: 0.5625rem; color: var(--text3); padding: 4px 0; }
.mc-day { font-size: 0.6875rem; padding: 5px 0; border-radius: 6px; color: var(--text3); }
.mc-day.read { background: var(--done-soft); color: var(--done); font-weight: 600; }
.mc-day.today { background: var(--accent-soft); color: var(--accent); font-weight: 700; }
.mc-day.empty { visibility: hidden; }

.nav-footer {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; justify-content: space-around;
  padding: 12px 0 calc(12px + env(safe-area-inset-bottom));
  background: var(--surface); border-top: 1px solid var(--border);
}
.nav-item { text-align: center; text-decoration: none; color: inherit; }
.nav-icon { font-size: 1.125rem; margin-bottom: 2px; }
.nav-label { font-size: 0.625rem; color: var(--text3); font-weight: 500; }
.nav-item.active .nav-label { color: var(--accent); font-weight: 600; }
</style>
</head>
<body>
<div class="page-content">
  <div class="home-header">
    <div class="home-greeting" id="greeting"></div>
    <div class="home-title">Learning System</div>
  </div>
  <div class="streak-bar">
    <span class="streak-fire">🔥</span>
    <span class="streak-text" id="streak-text">连续 0 天</span>
  </div>
  <div class="today-hero" id="today-hero"></div>
  <div class="timeline" id="timeline"></div>
  <div class="mini-month" id="mini-month"></div>
</div>

<div class="nav-footer">
  <a class="nav-item active" href="/"><div class="nav-icon">📅</div><div class="nav-label">首页</div></a>
  <a class="nav-item" href="/library/"><div class="nav-icon">📚</div><div class="nav-label">全部</div></a>
  <a class="nav-item" href="/notes/"><div class="nav-icon">✏️</div><div class="nav-label">笔记</div></a>
  <a class="nav-item" href="/topics/"><div class="nav-icon">🏷️</div><div class="nav-label">主题</div></a>
</div>

<script src="/assets/content-data.js"></script>
<script src="/assets/learning.js"></script>
<script>
(async function() {
  const START_DATE = '2026-04-23';
  const today = new Date();
  const todayStr = today.toISOString().slice(0, 10);

  // Greeting
  const hour = today.getHours();
  const greetEl = document.getElementById('greeting');
  greetEl.textContent = hour < 12 ? '早上好' : hour < 18 ? '下午好' : '晚上好';

  // Schedule: article[i] → START_DATE + i days
  function getArticleDate(index) {
    const d = new Date(START_DATE);
    d.setDate(d.getDate() + index);
    return d;
  }
  function dateDiffDays(a, b) {
    return Math.round((a - b) / 86400000);
  }
  function formatWeekday(d) {
    return ['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];
  }

  const todayMid = new Date(todayStr);
  const todayIndex = dateDiffDays(todayMid, new Date(START_DATE));

  // Fetch progress
  let progressData = {};
  try {
    const res = await api.get('/api/progress');
    if (res.progress) {
      res.progress.forEach(p => { progressData[p.contentId] = p; });
    }
  } catch(e) {}

  // Fetch activity for calendar
  const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
  const monthEnd = new Date(today.getFullYear(), today.getMonth() + 1, 0);
  let activityDays = new Set();
  try {
    const res = await api.get(`/api/activity?from=${monthStart.toISOString().slice(0,10)}&to=${monthEnd.toISOString().slice(0,10)}`);
    if (res.activity) res.activity.forEach(a => activityDays.add(a.date));
  } catch(e) {}

  // Streak
  let streak = 0;
  const checkDate = new Date(todayMid);
  // Check if today has activity; if not start from yesterday
  if (!activityDays.has(todayStr)) checkDate.setDate(checkDate.getDate() - 1);
  while (true) {
    if (activityDays.has(checkDate.toISOString().slice(0,10))) {
      streak++;
      checkDate.setDate(checkDate.getDate() - 1);
    } else break;
  }
  document.getElementById('streak-text').textContent = `连续 ${streak} 天`;

  // Today's article
  let todayArticle = null;
  // First: find one with status reading
  for (const art of ARTICLES) {
    const p = progressData[art.id];
    if (p && p.status === 'reading') { todayArticle = art; break; }
  }
  // Fallback: use schedule index
  if (!todayArticle && todayIndex >= 0 && todayIndex < ARTICLES.length) {
    todayArticle = ARTICLES[todayIndex];
  }
  if (!todayArticle) todayArticle = ARTICLES[0];

  const todayProgress = progressData[todayArticle.id];
  const pct = todayProgress ? todayProgress.percent || 0 : 0;
  const monthDay = today.getDate();
  const monthNum = today.getMonth() + 1;
  const weekday = formatWeekday(today);

  document.getElementById('today-hero').innerHTML = `
    <div class="today-date">今天 · ${monthNum}月${monthDay}日 ${weekday}</div>
    <div class="today-title">${todayArticle.title}</div>
    <div class="today-meta">${todayArticle.guest} · ${todayArticle.duration}</div>
    <div class="today-progress">
      <div class="today-progress-bar"><div class="today-progress-fill" style="width:${pct}%"></div></div>
      <div class="today-progress-pct">${pct}%</div>
    </div>
  `;
  document.getElementById('today-hero').onclick = () => {
    window.location.href = `/articles/${todayArticle.id}.html`;
  };

  // Timeline: show next 3 future articles
  let tlHtml = '<div class="tl-section-label">接下来</div>';
  let shown = 0;
  for (let i = todayIndex + 1; i < ARTICLES.length && shown < 3; i++) {
    const art = ARTICLES[i];
    const d = getArticleDate(i);
    tlHtml += `
      <div class="tl-item future">
        <div class="tl-date-col"><div class="tl-day-num">${d.getDate()}</div><div class="tl-day-name">${formatWeekday(d)}</div></div>
        <div class="tl-content"><div class="tl-title">${art.title}</div><div class="tl-subtitle">${art.guest}</div></div>
      </div>`;
    shown++;
  }
  document.getElementById('timeline').innerHTML = tlHtml;

  // Mini month calendar
  const year = today.getFullYear();
  const month = today.getMonth();
  const daysInMonth = monthEnd.getDate();
  const firstDow = (new Date(year, month, 1).getDay() + 6) % 7; // Monday=0
  let calHtml = `
    <div class="mini-month-header">
      <div class="mini-month-title">${month + 1} 月</div>
      <div class="mini-month-nav">← →</div>
    </div>
    <div class="mini-cal">
      <div class="mc-head">一</div><div class="mc-head">二</div><div class="mc-head">三</div><div class="mc-head">四</div><div class="mc-head">五</div><div class="mc-head">六</div><div class="mc-head">日</div>`;
  for (let i = 0; i < firstDow; i++) calHtml += '<div class="mc-day empty">·</div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    let cls = 'mc-day';
    if (ds === todayStr) cls += ' today';
    else if (activityDays.has(ds)) cls += ' read';
    calHtml += `<div class="${cls}">${d}</div>`;
  }
  calHtml += '</div>';
  document.getElementById('mini-month').innerHTML = calHtml;
})();
</script>
</body>
</html>
