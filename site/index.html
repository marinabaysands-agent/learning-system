<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Marina's Learning System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/learning.css?v=20260506b">
<style>
:root {
  --bg: oklch(98.5% 0.003 60);
  --surface: oklch(100% 0 0);
  --text: oklch(15% 0.01 60);
  --text2: oklch(50% 0.01 60);
  --text3: oklch(65% 0.01 60);
  --accent: oklch(45% 0.10 30);
  --border: oklch(92% 0.003 60);
  --serif: 'Noto Serif SC', Georgia, serif;
  --sans: 'Source Sans 3', -apple-system, system-ui, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); line-height: 1.75; -webkit-font-smoothing: antialiased; }
::selection { background: oklch(90% 0.06 30); }
.page { max-width: 640px; margin: 0 auto; padding: 80px 24px 64px; }

h1 { font-family: var(--serif); font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; line-height: 1.3; }
.site-desc { font-size: 0.9375rem; color: var(--text3); margin-top: 4px; font-weight: 300; }

.section { margin-top: 64px; }
.section-label { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin-bottom: 16px; }

.card {
  display: block; padding: 24px 28px;
  background: var(--surface); border-radius: 16px;
  box-shadow: 0 1px 3px oklch(0% 0 0 / 0.04), 0 4px 12px oklch(0% 0 0 / 0.06);
  text-decoration: none; color: inherit;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  margin-bottom: 16px;
}
.card:last-child { margin-bottom: 0; }
.card:hover { transform: translateY(-2px); box-shadow: 0 2px 6px oklch(0% 0 0 / 0.06), 0 8px 24px oklch(0% 0 0 / 0.10); }
.card-title { font-family: var(--serif); font-size: 1.125rem; font-weight: 600; line-height: 1.4; transition: color 0.15s; }
.card:hover .card-title { color: var(--accent); }
.card-meta { font-size: 0.8125rem; color: var(--text3); margin-top: 4px; }
.progress-bar { width: 100%; height: 4px; background: oklch(92% 0.003 60); border-radius: 2px; margin-top: 12px; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; }

.nav-links { display: flex; gap: 24px; flex-wrap: wrap; }
.nav-links a { font-size: 0.9375rem; color: var(--text2); text-decoration: none; font-weight: 500; transition: color 0.15s; }
.nav-links a:hover { color: var(--accent); }

.footer { margin-top: 80px; font-size: 0.8125rem; color: var(--text3); }
</style>
</head>
<body>
<div class="page">
  <h1>Learning System</h1>
  <div class="site-desc">读 → 划线 → 对话 → 内化</div>

  <div class="section">
    <div class="section-label">继续阅读</div>
    <div id="continue-list"></div>
  </div>

  <div class="section">
    <div class="section-label">推荐阅读</div>
    <div id="unread-list"></div>
  </div>

  <div class="section">
    <div class="nav-links">
      <a href="/library/">内容库</a>
      <a href="/notes/">我的笔记</a>
      <a href="/topics/">主题</a>
    </div>
  </div>

  <div class="footer">Sands 🏖️</div>
</div>

<script src="/assets/content-data.js?v=20260506b"></script>
<script src="/assets/learning.js?v=20260506b"></script>
<script>
async function init() {
  const [progressData, notesData] = await Promise.all([
    fetch(`${API_BASE}/api/progress`).then(r => r.json()).catch(() => ({})),
    fetch(`${API_BASE}/api/notes`).then(r => r.json()).catch(() => ({})),
  ]);

  const reading = [], unread = [];
  ARTICLES.forEach(a => {
    const p = progressData[a.id];
    if (p?.status === 'reading') reading.push({ ...a, progress: p.read_progress || 0 });
    else if (!p || p.status === 'unread') unread.push(a);
  });

  const continueList = document.getElementById('continue-list');
  if (reading.length) {
    continueList.innerHTML = reading.map(a => `
      <a class="card" href="/articles/${a.id}.html">
        <div class="card-title">${a.title}</div>
        <div class="card-meta">${a.guest} · ${Math.round(a.progress * 100)}% 已读</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${a.progress * 100}%"></div></div>
      </a>
    `).join('');
  } else {
    continueList.innerHTML = '<div style="font-size:0.875rem;color:var(--text3)">暂无阅读中的内容</div>';
  }

  const unreadList = document.getElementById('unread-list');
  const show = unread.slice(0, 3);
  if (show.length) {
    unreadList.innerHTML = show.map(a => `
      <a class="card" href="/articles/${a.id}.html">
        <div class="card-title">${a.title}</div>
        <div class="card-meta">${a.guest} · ${a.duration}</div>
      </a>
    `).join('');
  } else {
    unreadList.innerHTML = '<div style="font-size:0.875rem;color:var(--text3)">全部读完了 🎉</div>';
  }
}
init();
</script>
</body>
</html>
