<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>内容库 — Learning System</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: oklch(97.5% 0.004 60);
  --surface: oklch(100% 0 0);
  --text: oklch(15% 0.01 60);
  --text2: oklch(45% 0.01 60);
  --text3: oklch(62% 0.01 60);
  --accent: oklch(45% 0.12 25);
  --accent-soft: oklch(92% 0.04 25);
  --done: oklch(55% 0.08 155);
  --done-soft: oklch(93% 0.03 155);
  --border: oklch(93% 0.003 60);
  --serif: 'Noto Serif SC', Georgia, serif;
  --sans: 'Source Sans 3', -apple-system, system-ui, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }
.page-content { max-width: 390px; margin: 0 auto; padding: 56px 24px 100px; }

.lib-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.lib-title { font-family: var(--serif); font-size: 1.25rem; font-weight: 700; }
.lib-stats { font-size: 0.75rem; color: var(--text3); margin-top: 2px; }

.week-view { margin-top: 12px; }
.week-label { font-size: 0.6875rem; font-weight: 600; color: var(--text3); letter-spacing: 0.04em; margin-bottom: 8px; margin-top: 20px; }
.week-label:first-child { margin-top: 0; }

.day-row {
  display: flex; gap: 12px; align-items: center;
  padding: 12px 16px; margin-bottom: 4px; border-radius: 14px; transition: all 0.2s;
}
.day-row:hover { background: oklch(96% 0.003 60); }
.day-row.is-today { background: var(--accent-soft); box-shadow: 0 0 0 1px oklch(85% 0.05 25); }
.day-row.is-done { opacity: 0.7; }

.day-row-date { width: 36px; flex-shrink: 0; }
.day-row-num { font-size: 1rem; font-weight: 700; color: var(--text2); line-height: 1; }
.day-row-weekday { font-size: 0.5625rem; color: var(--text3); }
.day-row.is-today .day-row-num { color: var(--accent); }
.day-row.is-done .day-row-num { color: var(--done); }

.day-row-content { flex: 1; min-width: 0; }
.day-row-title { font-size: 0.8125rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.day-row-meta { font-size: 0.6875rem; color: var(--text3); }

.day-row-status { flex-shrink: 0; }
.status-done { width: 20px; height: 20px; border-radius: 50%; background: var(--done-soft); display: flex; align-items: center; justify-content: center; font-size: 0.625rem; color: var(--done); font-weight: 700; }
.status-progress { font-size: 0.6875rem; font-weight: 600; color: var(--accent); }
.status-empty { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid oklch(85% 0.01 60); }

.rest-day { color: var(--text3); font-style: italic; }

.nav-footer {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; justify-content: space-around;
  padding: 12px 0 calc(12px + env(safe-area-inset-bottom));
  background: var(--surface); border-top: 1px solid var(--border);
}
.nav-item { text-align: center; text-decoration: none; color: inherit; }
.nav-icon { font-size: 1.125rem; margin-bottom: 2px; }
.nav-label { font-size: 0.625rem; color: var(--text3); font-weight: 500; }
.nav-item.active .nav-label { color: var(--accent); font-weight: 600; }
</style>
</head>
<body>
<div class="page-content">
  <div class="lib-header">
    <div>
      <div class="lib-title">内容库</div>
      <div class="lib-stats" id="lib-stats"></div>
    </div>
  </div>
  <div class="week-view" id="week-view"></div>
</div>

<div class="nav-footer">
  <a class="nav-item" href="/"><div class="nav-icon">📅</div><div class="nav-label">首页</div></a>
  <a class="nav-item active" href="/library/"><div class="nav-icon">📚</div><div class="nav-label">全部</div></a>
  <a class="nav-item" href="/notes/"><div class="nav-icon">✏️</div><div class="nav-label">笔记</div></a>
  <a class="nav-item" href="/topics/"><div class="nav-icon">🏷️</div><div class="nav-label">主题</div></a>
</div>

<script src="/assets/content-data.js"></script>
<script src="/assets/learning.js"></script>
<script>
(async function() {
  const START_DATE = '2026-04-23';
  const today = new Date();
  const todayStr = today.toISOString().slice(0, 10);
  const WEEKDAYS = ['日','一','二','三','四','五','六'];

  function getArticleDate(index) {
    const d = new Date(START_DATE);
    d.setDate(d.getDate() + index);
    return d;
  }

  // Fetch progress
  let progressData = {};
  try {
    const res = await api.get('/api/progress');
    if (res.progress) res.progress.forEach(p => { progressData[p.contentId] = p; });
  } catch(e) {}

  // Stats
  const total = ARTICLES.length;
  const doneCount = Object.values(progressData).filter(p => p.status === 'done').length;
  document.getElementById('lib-stats').textContent = `${total} 篇 · ${doneCount} 已读`;

  // Build schedule with dates
  const schedule = ARTICLES.map((art, i) => ({ art, date: getArticleDate(i), index: i }));

  // Group by week (Monday-based)
  function getWeekMonday(d) {
    const copy = new Date(d);
    const dow = copy.getDay();
    const diff = (dow === 0 ? -6 : 1) - dow;
    copy.setDate(copy.getDate() + diff);
    return copy;
  }

  // Build all days from first article to last, grouped by week
  const firstDate = new Date(START_DATE);
  const lastDate = getArticleDate(ARTICLES.length - 1);
  // Extend to end of that week (Sunday)
  const lastSunday = new Date(lastDate);
  const ld = lastSunday.getDay();
  if (ld !== 0) lastSunday.setDate(lastSunday.getDate() + (7 - ld));

  // Map date string → article
  const dateToArticle = {};
  schedule.forEach(s => { dateToArticle[s.date.toISOString().slice(0,10)] = s.art; });

  // Generate weeks
  let weeks = [];
  let current = getWeekMonday(firstDate);
  while (current <= lastSunday) {
    const weekStart = new Date(current);
    const weekEnd = new Date(current);
    weekEnd.setDate(weekEnd.getDate() + 6);
    let days = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(current);
      d.setDate(d.getDate() + i);
      days.push(d);
    }
    weeks.push({ start: weekStart, end: weekEnd, days });
    current.setDate(current.getDate() + 7);
  }

  // Render
  let html = '';
  const todayMid = new Date(todayStr);
  
  for (const week of weeks) {
    // Week label
    const ws = week.start;
    const we = week.end;
    const isThisWeek = todayMid >= ws && todayMid <= we;
    const wsMonth = ws.getMonth() + 1;
    const weMonth = we.getMonth() + 1;
    const label = isThisWeek ? '本周' : `${wsMonth}月${ws.getDate()}日`;
    const rangeStr = `${wsMonth}月${ws.getDate()}日—${weMonth === wsMonth ? '' : weMonth + '月'}${we.getDate()}日`;
    html += `<div class="week-label">${isThisWeek ? '本周' : label} · ${rangeStr}</div>`;

    for (const day of week.days) {
      const ds = day.toISOString().slice(0,10);
      const art = dateToArticle[ds];
      const isToday = ds === todayStr;
      const dow = day.getDay();
      const weekdayLabel = isToday ? '今天' : `周${WEEKDAYS[dow]}`;

      if (!art) {
        // Rest day
        html += `<div class="day-row">
          <div class="day-row-date"><div class="day-row-num">${day.getDate()}</div><div class="day-row-weekday">${weekdayLabel}</div></div>
          <div class="day-row-content"><div class="day-row-title rest-day">休息日 ☕</div></div>
          <div class="day-row-status"></div>
        </div>`;
        continue;
      }

      const p = progressData[art.id];
      const status = p ? p.status : 'unread';
      const pct = p ? (p.percent || 0) : 0;

      let cls = 'day-row';
      if (isToday) cls += ' is-today';
      else if (status === 'done') cls += ' is-done';

      let statusHtml = '';
      if (status === 'done') statusHtml = '<div class="status-done">✓</div>';
      else if (status === 'reading' && pct > 0) statusHtml = `<div class="status-progress">${pct}%</div>`;
      else statusHtml = '<div class="status-empty"></div>';

      html += `<div class="${cls}">
        <div class="day-row-date"><div class="day-row-num">${day.getDate()}</div><div class="day-row-weekday">${weekdayLabel}</div></div>
        <div class="day-row-content"><div class="day-row-title">${art.title}</div><div class="day-row-meta">${art.guest}</div></div>
        <div class="day-row-status">${statusHtml}</div>
      </div>`;
    }
  }

  document.getElementById('week-view').innerHTML = html;
})();
</script>
</body>
</html>
