<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>主题 — Learning System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/learning.css?v=20260506b">
<style>
:root {
  --bg: oklch(98.5% 0.003 60);
  --surface: oklch(100% 0 0);
  --text: oklch(15% 0.01 60);
  --text2: oklch(50% 0.01 60);
  --text3: oklch(65% 0.01 60);
  --accent: oklch(45% 0.10 30);
  --border: oklch(92% 0.003 60);
  --serif: 'Noto Serif SC', Georgia, serif;
  --sans: 'Source Sans 3', -apple-system, system-ui, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); line-height: 1.75; -webkit-font-smoothing: antialiased; }
::selection { background: oklch(90% 0.06 30); }
.page { max-width: 720px; margin: 0 auto; padding: 64px 24px; }

.back { font-size: 0.8125rem; color: var(--text3); text-decoration: none; }
.back:hover { color: var(--text); }
h1 { font-family: var(--serif); font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; margin-top: 24px; line-height: 1.3; }
.desc { font-size: 0.875rem; color: var(--text3); margin-top: 6px; margin-bottom: 32px; }

.tag-cloud { display: flex; flex-wrap: wrap; gap: 10px; }
.topic-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px;
  border-radius: 100px;
  font-size: 0.8125rem;
  font-weight: 500;
  cursor: pointer;
  text-decoration: none;
  transition: transform 0.15s, box-shadow 0.15s;
}
.topic-pill:hover { transform: translateY(-1px); box-shadow: 0 2px 8px oklch(0% 0 0 / 0.08); }
.topic-count { font-size: 0.6875rem; opacity: 0.7; }

.topic-detail {
  margin-top: 24px; padding: 20px 24px;
  background: var(--surface); border-radius: 12px;
  box-shadow: 0 1px 3px oklch(0% 0 0 / 0.04), 0 4px 12px oklch(0% 0 0 / 0.06);
  display: none;
}
.topic-detail.open { display: block; }
.topic-detail-title { font-family: var(--serif); font-size: 1rem; font-weight: 600; margin-bottom: 12px; }
.topic-article { display: block; padding: 6px 0; text-decoration: none; color: var(--text2); font-size: 0.9375rem; transition: color 0.15s; }
.topic-article:hover { color: var(--accent); }

.footer { margin-top: 64px; font-size: 0.8125rem; color: var(--text3); }
.footer a { color: var(--text2); text-decoration: none; }
</style>
</head>
<body>
<div class="page">
  <a class="back" href="/">← 首页</a>
  <h1>主题</h1>
  <div class="desc">按标签浏览内容</div>

  <div class="tag-cloud" id="tag-cloud"></div>
  <div class="topic-detail" id="topic-detail"></div>

  <div class="footer"><a href="/">首页</a> · <a href="/library/">内容库</a> · <a href="/notes/">笔记</a></div>
</div>

<script src="/assets/content-data.js?v=20260506b"></script>
<script>
const topicMap = {};
ARTICLES.forEach(a => {
  a.tags.forEach(t => {
    if (!topicMap[t]) topicMap[t] = [];
    topicMap[t].push(a);
  });
});

const sorted = Object.entries(topicMap).sort((a, b) => b[1].length - a[1].length);
const cloud = document.getElementById('tag-cloud');
const detail = document.getElementById('topic-detail');

cloud.innerHTML = sorted.map(([tag, articles]) => {
  const info = TAGS[tag] || { label: tag, color: 'oklch(58% 0.07 60)' };
  const match = info.color.match(/(\d+)\s*\)$/);
  const hue = match ? match[1] : '60';
  const bg = `oklch(94% 0.015 ${hue})`;
  const fg = `oklch(40% 0.05 ${hue})`;
  return `<a class="topic-pill" data-tag="${tag}" style="background:${bg};color:${fg}">${info.label} <span class="topic-count">${articles.length}</span></a>`;
}).join('');

cloud.addEventListener('click', e => {
  const pill = e.target.closest('.topic-pill');
  if (!pill) return;
  const tag = pill.dataset.tag;
  const articles = topicMap[tag];
  const info = TAGS[tag] || { label: tag };
  detail.classList.add('open');
  detail.innerHTML = `<div class="topic-detail-title">${info.label}（${articles.length} 篇）</div>` +
    articles.map(a => `<a class="topic-article" href="/articles/${a.id}.html">${a.title}</a>`).join('');
  detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
});
</script>
</body>
</html>
