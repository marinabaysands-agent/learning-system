<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>主题 — Learning System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/learning.css?v=20260507">
<style>
:root {
  --bg: oklch(97.5% 0.004 60);
  --surface: oklch(100% 0 0);
  --text: oklch(15% 0.01 60);
  --text2: oklch(45% 0.01 60);
  --text3: oklch(62% 0.01 60);
  --accent: oklch(45% 0.12 25);
  --accent-soft: oklch(92% 0.04 25);
  --done: oklch(55% 0.08 155);
  --done-soft: oklch(93% 0.03 155);
  --border: oklch(93% 0.003 60);
  --serif: 'Noto Serif SC', Georgia, serif;
  --sans: 'Source Sans 3', -apple-system, system-ui, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
.page-content { max-width: 390px; margin: 0 auto; padding: 56px 24px 100px; }

.page-header { font-family: var(--serif); font-size: 1.25rem; font-weight: 700; margin-bottom: 24px; }

.pill-cloud { display: flex; flex-wrap: wrap; gap: 8px; }
.pill {
  padding: 10px 16px;
  border-radius: 12px;
  font-size: 0.8125rem;
  font-weight: 500;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.pill:hover { transform: translateY(-1px); box-shadow: 0 2px 8px oklch(0% 0 0 / 0.06); }
.pill .pill-count { font-size: 0.6875rem; opacity: 0.7; margin-left: 4px; }

.detail-panel {
  margin-top: 20px;
  background: var(--surface);
  border-radius: 14px;
  padding: 20px;
  box-shadow: 0 1px 3px oklch(0% 0 0 / 0.04), 0 4px 12px oklch(0% 0 0 / 0.04);
  display: none;
}
.detail-panel.open { display: block; }
.detail-title { font-size: 0.8125rem; font-weight: 600; color: var(--text2); margin-bottom: 12px; }
.detail-list a {
  display: block;
  padding: 10px 0;
  font-size: 0.8125rem;
  color: var(--text);
  text-decoration: none;
  border-bottom: 1px solid var(--border);
}
.detail-list a:last-child { border-bottom: none; }
.detail-list a:hover { color: var(--accent); }

.nav-footer {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; justify-content: space-around;
  padding: 12px 0 calc(12px + env(safe-area-inset-bottom));
  background: var(--surface); border-top: 1px solid var(--border);
}
.nav-item { text-align: center; text-decoration: none; color: inherit; }
.nav-icon { font-size: 1.125rem; margin-bottom: 2px; }
.nav-label { font-size: 0.625rem; color: var(--text3); font-weight: 500; }
.nav-item.active .nav-label { color: var(--accent); font-weight: 600; }
</style>
</head>
<body>
<div class="page-content">
  <div class="page-header">主题</div>
  <div class="pill-cloud" id="pill-cloud"></div>
  <div class="detail-panel" id="detail-panel"></div>
</div>

<div class="nav-footer">
  <a class="nav-item" href="/"><div class="nav-icon">📅</div><div class="nav-label">首页</div></a>
  <a class="nav-item" href="/library/"><div class="nav-icon">📚</div><div class="nav-label">全部</div></a>
  <a class="nav-item" href="/notes/"><div class="nav-icon">✏️</div><div class="nav-label">笔记</div></a>
  <a class="nav-item active" href="/topics/"><div class="nav-icon">🏷️</div><div class="nav-label">主题</div></a>
</div>

<script src="/assets/content-data.js?v=20260507"></script>
<script src="/assets/learning.js?v=20260507"></script>
<script>
const ALL_ITEMS = [...ARTICLES, ...(typeof BACKLOG !== 'undefined' ? BACKLOG : [])];
const topicMap = {};
ALL_ITEMS.forEach(a => {
  (a.tags || []).forEach(t => {
    if (!topicMap[t]) topicMap[t] = [];
    topicMap[t].push(a);
  });
});

const sorted = Object.entries(topicMap).sort((a, b) => b[1].length - a[1].length);
const cloud = document.getElementById('pill-cloud');
const detail = document.getElementById('detail-panel');

cloud.innerHTML = sorted.map(([tag, articles]) => {
  const info = TAGS[tag] || { label: tag, color: 'oklch(58% 0.07 60)' };
  const match = info.color.match(/(\d+)\s*\)$/);
  const hue = match ? match[1] : '60';
  const bg = `oklch(94% 0.02 ${hue})`;
  const fg = `oklch(35% 0.06 ${hue})`;
  return `<span class="pill" data-tag="${tag}" style="background:${bg};color:${fg}">${info.label}<span class="pill-count">${articles.length}</span></span>`;
}).join('');

cloud.addEventListener('click', e => {
  const pill = e.target.closest('.pill');
  if (!pill) return;
  const tag = pill.dataset.tag;
  const articles = topicMap[tag];
  const info = TAGS[tag] || { label: tag };
  detail.classList.add('open');
  detail.innerHTML = `<div class="detail-title">${info.label} · ${articles.length} 篇</div>
    <div class="detail-list">${articles.map(a => `<a href="/articles/${a.id}.html">${a.title}</a>`).join('')}</div>`;
  detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
});
</script>
</body>
</html>
