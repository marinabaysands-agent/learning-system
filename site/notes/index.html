<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>我的笔记 — Learning System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/learning.css?v=20260507">
<style>
:root {
  --bg: oklch(97.5% 0.004 60);
  --surface: oklch(100% 0 0);
  --text: oklch(15% 0.01 60);
  --text2: oklch(45% 0.01 60);
  --text3: oklch(62% 0.01 60);
  --accent: oklch(45% 0.12 25);
  --accent-soft: oklch(92% 0.04 25);
  --done: oklch(55% 0.08 155);
  --done-soft: oklch(93% 0.03 155);
  --border: oklch(93% 0.003 60);
  --serif: 'Noto Serif SC', Georgia, serif;
  --sans: 'Source Sans 3', -apple-system, system-ui, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
.page-content { max-width: 390px; margin: 0 auto; padding: 56px 24px 100px; }

.page-header { font-family: var(--serif); font-size: 1.25rem; font-weight: 700; margin-bottom: 20px; }

.stats-row { display: flex; gap: 24px; margin-bottom: 28px; }
.stat-block { text-align: center; }
.stat-num { font-family: var(--serif); font-size: 1.5rem; font-weight: 700; color: var(--text); }
.stat-label { font-size: 0.6875rem; color: var(--text3); margin-top: 2px; }

.article-card {
  background: var(--surface);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 1px 3px oklch(0% 0 0 / 0.04), 0 4px 12px oklch(0% 0 0 / 0.04);
}
.article-card-title {
  font-family: var(--serif);
  font-size: 0.9375rem;
  font-weight: 600;
  margin-bottom: 4px;
}
.article-card-title a { color: inherit; text-decoration: none; }
.article-card-meta { font-size: 0.6875rem; color: var(--text3); margin-bottom: 14px; }

.hl-line {
  border-left: 3px solid oklch(82% 0.08 80);
  background: oklch(98% 0.004 80);
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 8px;
  font-size: 0.8125rem;
  line-height: 1.7;
  color: var(--text);
}

.empty-state { font-size: 0.875rem; color: var(--text3); text-align: center; padding: 48px 0; line-height: 2; }
.empty-state a { color: var(--accent); text-decoration: none; }

.nav-footer {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; justify-content: space-around;
  padding: 12px 0 calc(12px + env(safe-area-inset-bottom));
  background: var(--surface); border-top: 1px solid var(--border);
}
.nav-item { text-align: center; text-decoration: none; color: inherit; }
.nav-icon { font-size: 1.125rem; margin-bottom: 2px; }
.nav-label { font-size: 0.625rem; color: var(--text3); font-weight: 500; }
.nav-item.active .nav-label { color: var(--accent); font-weight: 600; }
</style>
</head>
<body>
<div class="page-content">
  <div class="page-header">我的笔记</div>
  <div class="stats-row" id="stats"></div>
  <div id="notes-container"><div class="empty-state">加载中...</div></div>
</div>

<div class="nav-footer">
  <a class="nav-item" href="/"><div class="nav-icon">📅</div><div class="nav-label">首页</div></a>
  <a class="nav-item" href="/library/"><div class="nav-icon">📚</div><div class="nav-label">全部</div></a>
  <a class="nav-item active" href="/notes/"><div class="nav-icon">✏️</div><div class="nav-label">笔记</div></a>
  <a class="nav-item" href="/topics/"><div class="nav-icon">🏷️</div><div class="nav-label">主题</div></a>
</div>

<script src="/assets/content-data.js?v=20260507"></script>
<script src="/assets/learning.js?v=20260507"></script>
<script>
const ALL_ITEMS = [
  ...ARTICLES.map(a => ({ ...a, type: 'analysis' })),
  ...(typeof BACKLOG !== 'undefined' ? BACKLOG : [])
];

async function init() {
  const container = document.getElementById('notes-container');
  const statsEl = document.getElementById('stats');

  // Fetch all highlights
  let allHighlights = [];
  try {
    const data = await fetch(`${API_BASE}/api/highlights`).then(r => r.json());
    if (Array.isArray(data)) allHighlights = data;
  } catch {
    // Fallback: fetch per article
    const fetches = ALL_ITEMS.map(async item => {
      try {
        const data = await fetch(`${API_BASE}/api/highlights/${item.id}`).then(r => r.json());
        return Array.isArray(data) ? data.map(h => ({ ...h, contentId: item.id })) : [];
      } catch { return []; }
    });
    allHighlights = (await Promise.all(fetches)).flat();
  }

  // Group by contentId
  const grouped = {};
  allHighlights.forEach(h => {
    const cid = h.contentId;
    if (!grouped[cid]) grouped[cid] = [];
    grouped[cid].push(h);
  });

  const articleCount = Object.keys(grouped).length;
  const totalHL = allHighlights.length;

  statsEl.innerHTML = `
    <div class="stat-block"><div class="stat-num">${totalHL}</div><div class="stat-label">划线</div></div>
    <div class="stat-block"><div class="stat-num">${articleCount}</div><div class="stat-label">篇文章</div></div>
  `;

  if (!totalHL) {
    container.innerHTML = '<div class="empty-state">还没有笔记。<br>去<a href="/library/">内容库</a>阅读文章并划线高亮吧。</div>';
    return;
  }

  container.innerHTML = Object.entries(grouped).map(([cid, highlights]) => {
    const item = ALL_ITEMS.find(a => a.id === cid) || { title: cid, guest: '', date: '' };
    const href = `/articles/${cid}.html`;
    const meta = [item.guest, item.date].filter(Boolean).join(' · ');
    const hlHtml = highlights
      .sort((a, b) => (a.position?.start || 0) - (b.position?.start || 0))
      .map(h => `<div class="hl-line">${esc(h.text)}</div>`).join('');
    return `<div class="article-card">
      <div class="article-card-title"><a href="${href}">${item.title}</a></div>
      <div class="article-card-meta">${meta}</div>
      ${hlHtml}
    </div>`;
  }).join('');
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
init();
</script>
</body>
</html>
